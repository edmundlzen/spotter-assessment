services:
  - type: web
    name: spotter-eld-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application
    healthCheckPath: /api/health/
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: ORS_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: spotter-eld-db
          property: connectionString

databases:
  - name: spotter-eld-db
    plan: free
    region: oregon
    databaseName: spotter_eld
    user: spotter_eld
    postgresMajorVersion: "18"
